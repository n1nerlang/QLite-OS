name: Docs

on:
  push:
    paths:
      - "**/*.md"
      - "icons/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "**/*.md"
      - "icons/**"
      - ".github/workflows/docs.yml"

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check markdown inventory
        run: |
          find . -name '*.md' | sort
          test -f README.md
          test -f docs/architecture.md
          test -f docs/apps.md
          test -f docs/terminal.md
          test -f docs/roadmap.md
